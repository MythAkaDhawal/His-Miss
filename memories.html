<!DOCTYPE html>
<html lang="en">
<head>

  <title>Memory Constellation</title>
  <link rel="stylesheet" href="style.css">

<body>
  <main class="app-shell">

      <div id="constellation" class="constellation" aria-label="Birthday memory videos"></div>

      <nav class="cta-row">

      <button id="closeVideo" class="close-btn" aria-label="Close video">×</button>
